<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LiftLog Focus</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap");

    :root {
      --ink: #171b18;
      --muted: #69716c;
      --paper: #f3f0e9;
      --card: #fffdf8;
      --line: #d7d5cd;
      --signal: #e9582b;
      --signal-soft: #ffd6c7;
      --acid: #c9ef44;
      --shadow: 0 16px 44px rgba(25, 31, 27, .09);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 100% 0%, rgba(201, 239, 68, .28), transparent 28rem),
        var(--paper);
      font-family: "DM Sans", sans-serif;
      min-height: 100vh;
    }

    button, input { font: inherit; color: inherit; }
    button { cursor: pointer; }

    .shell {
      width: min(100%, 720px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 14px 92px;
    }

    .masthead {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--signal);
      font: 500 11px/1.2 "DM Mono", monospace;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    h1, h2, p { margin-top: 0; }
    h1 {
      margin-bottom: 0;
      font: 400 clamp(26px, 8vw, 42px)/.96 "Archivo Black", sans-serif;
      letter-spacing: -.045em;
    }

    .backup {
      margin-top: 4px;
      color: var(--muted);
      font: 500 10px/1.3 "DM Mono", monospace;
      text-align: right;
    }

    .session-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin: 0 -14px 16px;
      padding: 0 14px 4px;
      scrollbar-width: none;
    }
    .session-tabs::-webkit-scrollbar { display: none; }

    .tab {
      border: 1px solid var(--line);
      border-radius: 99px;
      padding: 9px 15px;
      background: transparent;
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
    }
    .tab.active {
      border-color: var(--ink);
      color: var(--card);
      background: var(--ink);
    }

    .progress-card {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 253, 248, .6);
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 7px;
      font: 500 10px/1.2 "DM Mono", monospace;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .track {
      height: 7px;
      overflow: hidden;
      border-radius: 10px;
      background: var(--line);
    }
    .track span {
      display: block;
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: var(--signal);
      transition: width .25s ease;
    }

    .dots { display: flex; gap: 5px; }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--line);
    }
    .dot.current { outline: 2px solid var(--signal); outline-offset: 2px; }
    .dot.done { background: var(--signal); }

    .focus-card {
      position: relative;
      overflow: hidden;
      padding: 21px 16px 17px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--card);
      box-shadow: var(--shadow);
    }
    .focus-card::before {
      position: absolute;
      inset: 0 0 auto;
      height: 5px;
      background: var(--signal);
      content: "";
    }

    .exercise-count {
      margin-bottom: 9px;
      color: var(--signal);
      font: 500 11px/1 "DM Mono", monospace;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .exercise-name {
      max-width: 14ch;
      margin-bottom: 7px;
      font: 400 clamp(29px, 9vw, 48px)/.98 "Archivo Black", sans-serif;
      letter-spacing: -.045em;
    }

    .prescription {
      margin-bottom: 20px;
      color: var(--muted);
      font: 500 12px/1.4 "DM Mono", monospace;
      text-transform: uppercase;
    }

    .set-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 7px;
    }
    .set-heading h2 {
      margin-bottom: 0;
      font: 400 19px/1 "Archivo Black", sans-serif;
      letter-spacing: -.03em;
    }
    .last-date { color: var(--muted); font: 10px/1 "DM Mono", monospace; }

    .set-row {
      display: grid;
      grid-template-columns: 30px 1fr 1fr 44px;
      gap: 7px;
      align-items: center;
      padding: 8px 0;
      border-top: 1px solid var(--line);
    }

    .set-number {
      font: 500 12px/1 "DM Mono", monospace;
      text-align: center;
    }

    .input-wrap {
      position: relative;
    }
    .input-wrap input {
      width: 100%;
      min-width: 0;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 11px;
      padding: 7px 28px 7px 9px;
      background: #faf8f2;
      font: 500 17px/1 "DM Mono", monospace;
    }
    .input-wrap input:focus {
      border-color: var(--signal);
      outline: 3px solid var(--signal-soft);
    }
    .unit {
      position: absolute;
      top: 19px;
      right: 8px;
      color: var(--muted);
      font: 500 9px/1 "DM Mono", monospace;
      text-transform: uppercase;
      pointer-events: none;
    }

    .complete-set {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: transparent;
      font-weight: 700;
    }
    .complete-set.done {
      border-color: var(--acid);
      background: var(--acid);
    }

    .last-note {
      margin: 5px 0 0 37px;
      color: var(--muted);
      font: 10px/1.4 "DM Mono", monospace;
    }

    .exercise-nav {
      display: grid;
      grid-template-columns: 1fr 1.7fr;
      gap: 8px;
      margin-top: 16px;
    }
    .nav-button {
      min-height: 50px;
      border: 1px solid var(--ink);
      border-radius: 14px;
      background: transparent;
      font-weight: 700;
    }
    .nav-button.primary { background: var(--ink); color: var(--card); }
    .nav-button:disabled { opacity: .35; cursor: default; }

    .timer {
      position: fixed;
      z-index: 5;
      right: 12px;
      bottom: 12px;
      left: 12px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 9px;
      align-items: center;
      width: min(calc(100% - 24px), 696px);
      margin: auto;
      padding: 10px 10px 10px 15px;
      border: 1px solid #313833;
      border-radius: 18px;
      color: white;
      background: rgba(23, 27, 24, .96);
      box-shadow: 0 10px 32px rgba(0, 0, 0, .25);
      backdrop-filter: blur(12px);
    }
    .timer.running { border-color: var(--acid); }
    .timer-label { color: #aab2ac; font: 500 9px/1.3 "DM Mono", monospace; text-transform: uppercase; }
    .timer-time { margin-top: 2px; font: 400 23px/1 "Archivo Black", sans-serif; }
    .timer-btn {
      min-width: 58px;
      height: 40px;
      border: 0;
      border-radius: 11px;
      background: var(--acid);
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
    }
    .timer-btn.secondary { background: #373e39; color: white; }

    .empty {
      margin-top: 20vh;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--card);
      text-align: center;
    }

    @media (min-width: 640px) {
      .shell { padding-top: 32px; }
      .focus-card { padding: 30px; }
      .set-row { grid-template-columns: 38px 1fr 1fr 52px; gap: 12px; }
      .exercise-nav { grid-template-columns: 1fr 2fr; }
    }
  </style>
</head>
<body>
  <main class="shell" id="app"></main>

  <script src="workout-data.js"></script>
  <script>
    (() => {
      const data = window.WORKOUT_DATA;
      const app = document.querySelector("#app");
      const storageKey = "liftlog-focus-b-v1";
      let saved = {};
      try { saved = JSON.parse(localStorage.getItem(storageKey)) || {}; } catch (_) {}

      let sessionIndex = Math.min(saved.sessionIndex || 0, Math.max(0, (data?.sessions?.length || 1) - 1));
      let exerciseIndex = Math.min(saved.exerciseIndex || 0, Math.max(0, (data?.sessions?.[sessionIndex]?.exercises?.length || 1) - 1));
      let timerRemaining = null;
      let timerHandle = null;

      const keyFor = (s, e, set) => `${s}:${e}:${set}`;
      const persist = () => {
        saved.sessionIndex = sessionIndex;
        saved.exerciseIndex = exerciseIndex;
        localStorage.setItem(storageKey, JSON.stringify(saved));
      };

      const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      }[char]));

      const setState = (setIndex) => {
        const exercise = data.sessions[sessionIndex].exercises[exerciseIndex];
        const previous = exercise.last?.[setIndex] || {};
        return saved.sets?.[keyFor(sessionIndex, exerciseIndex, setIndex)] || {
          weight: previous.weight ?? "",
          reps: previous.reps ?? "",
          done: false
        };
      };

      const totalSets = session => session.exercises.reduce((sum, exercise) => sum + exercise.sets, 0);
      const completedSets = session => session.exercises.reduce((sum, exercise, eIndex) => {
        return sum + Array.from({ length: exercise.sets }, (_, setIndex) =>
          saved.sets?.[keyFor(sessionIndex, eIndex, setIndex)]?.done ? 1 : 0
        ).reduce((a, b) => a + b, 0);
      }, 0);

      function render() {
        if (!data?.sessions?.length) {
          app.innerHTML = `<section class="empty"><p class="eyebrow">Workout data unavailable</p><h1>Waiting for workout-data.js</h1></section>`;
          return;
        }

        const session = data.sessions[sessionIndex];
        exerciseIndex = Math.min(exerciseIndex, session.exercises.length - 1);
        const exercise = session.exercises[exerciseIndex];
        const done = completedSets(session);
        const total = totalSets(session);
        const sets = Array.from({ length: exercise.sets }, (_, index) => {
          const state = setState(index);
          const previous = exercise.last?.[index] || {};
          return `
            <div class="set-row">
              <span class="set-number">${index + 1}</span>
              <label class="input-wrap">
                <input inputmode="decimal" aria-label="Set ${index + 1} weight" data-field="weight" data-set="${index}" value="${escapeHtml(state.weight)}">
                <span class="unit">kg</span>
              </label>
              <label class="input-wrap">
                <input inputmode="numeric" aria-label="Set ${index + 1} reps" data-field="reps" data-set="${index}" value="${escapeHtml(state.reps)}">
                <span class="unit">reps</span>
              </label>
              <button class="complete-set ${state.done ? "done" : ""}" data-complete="${index}" aria-label="Mark set ${index + 1} complete">${state.done ? "✓" : "○"}</button>
            </div>
            <p class="last-note">Last: ${escapeHtml(previous.weight ?? "—")} kg × ${escapeHtml(previous.reps ?? "—")} reps</p>`;
        }).join("");

        app.innerHTML = `
          <header class="masthead">
            <div><p class="eyebrow">Focus mode / ${escapeHtml(session.name)}</p><h1>${escapeHtml(data.name)}</h1></div>
            <p class="backup">BACKUP<br>${escapeHtml(data.backupDate)}</p>
          </header>
          <nav class="session-tabs" aria-label="Workout sessions">
            ${data.sessions.map((item, index) => `<button class="tab ${index === sessionIndex ? "active" : ""}" role="tab" aria-selected="${index === sessionIndex}" data-session="${index}">${escapeHtml(item.name)}</button>`).join("")}
          </nav>
          <section class="progress-card">
            <div>
              <div class="progress-label"><span>Workout progress</span><span>${done} / ${total} sets</span></div>
              <div class="track"><span style="width:${total ? (done / total) * 100 : 0}%"></span></div>
            </div>
            <div class="dots">${session.exercises.map((_, index) => `<span class="dot ${index === exerciseIndex ? "current" : ""} ${index < exerciseIndex ? "done" : ""}"></span>`).join("")}</div>
          </section>
          <article class="focus-card">
            <p class="exercise-count">Exercise ${exerciseIndex + 1} of ${session.exercises.length}</p>
            <h2 class="exercise-name">${escapeHtml(exercise.name)}</h2>
            <p class="prescription">${exercise.sets} sets × ${escapeHtml(exercise.repsPerSet)} reps · ${session.targetRestSeconds}s rest</p>
            <div class="set-heading"><h2>Working sets</h2><span class="last-date">Last ${escapeHtml(session.lastDate)}</span></div>
            ${sets}
            <div class="exercise-nav">
              <button class="nav-button" data-nav="-1" ${exerciseIndex === 0 ? "disabled" : ""}>← Previous</button>
              <button class="nav-button primary" data-nav="1" ${exerciseIndex === session.exercises.length - 1 ? "disabled" : ""}>Next exercise →</button>
            </div>
          </article>
          <aside class="timer" id="timer">
            <div><div class="timer-label">Rest timer · target ${session.targetRestSeconds}s</div><div class="timer-time" id="timerTime">${formatTime(timerRemaining ?? session.targetRestSeconds)}</div></div>
            <button class="timer-btn secondary" data-timer="reset">Reset</button>
            <button class="timer-btn" data-timer="toggle">${timerHandle ? "Pause" : "Start"}</button>
          </aside>`;

        attachEvents();
      }

      function formatTime(seconds) {
        return `${Math.floor(seconds / 60)}:${String(seconds % 60).padStart(2, "0")}`;
      }

      function updateTimer() {
        const session = data.sessions[sessionIndex];
        const display = document.querySelector("#timerTime");
        if (display) display.textContent = formatTime(timerRemaining ?? session.targetRestSeconds);
        document.querySelector("#timer")?.classList.toggle("running", Boolean(timerHandle));
        const button = document.querySelector('[data-timer="toggle"]');
        if (button) button.textContent = timerHandle ? "Pause" : "Start";
      }

      function toggleTimer() {
        if (timerHandle) {
          clearInterval(timerHandle);
          timerHandle = null;
        } else {
          if (timerRemaining === null || timerRemaining === 0) timerRemaining = data.sessions[sessionIndex].targetRestSeconds;
          timerHandle = setInterval(() => {
            timerRemaining = Math.max(0, timerRemaining - 1);
            if (!timerRemaining) {
              clearInterval(timerHandle);
              timerHandle = null;
              if (navigator.vibrate) navigator.vibrate([180, 100, 180]);
            }
            updateTimer();
          }, 1000);
        }
        updateTimer();
      }

      function attachEvents() {
        document.querySelectorAll("[data-session]").forEach(button => button.addEventListener("click", () => {
          sessionIndex = Number(button.dataset.session);
          exerciseIndex = 0;
          resetTimer();
          persist();
          render();
        }));

        document.querySelectorAll("[data-nav]").forEach(button => button.addEventListener("click", () => {
          exerciseIndex += Number(button.dataset.nav);
          persist();
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }));

        document.querySelectorAll("[data-field]").forEach(input => input.addEventListener("input", () => {
          saved.sets ||= {};
          const key = keyFor(sessionIndex, exerciseIndex, Number(input.dataset.set));
          saved.sets[key] = { ...setState(Number(input.dataset.set)), [input.dataset.field]: input.value };
          persist();
        }));

        document.querySelectorAll("[data-complete]").forEach(button => button.addEventListener("click", () => {
          const setIndex = Number(button.dataset.complete);
          saved.sets ||= {};
          saved.sets[keyFor(sessionIndex, exerciseIndex, setIndex)] = { ...setState(setIndex), done: !setState(setIndex).done };
          persist();
          if (saved.sets[keyFor(sessionIndex, exerciseIndex, setIndex)].done) resetTimer(true);
          render();
        }));

        document.querySelector('[data-timer="toggle"]').addEventListener("click", toggleTimer);
        document.querySelector('[data-timer="reset"]').addEventListener("click", () => resetTimer(true));
      }

      function resetTimer(start = false) {
        clearInterval(timerHandle);
        timerHandle = null;
        timerRemaining = data.sessions[sessionIndex].targetRestSeconds;
        if (start) toggleTimer();
        else updateTimer();
      }

      render();
    })();
  </script>
</body>
</html>
