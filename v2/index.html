<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>LiftLog v2</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #4ade80;
      --accent-dim: #166534;
      --next-badge: #facc15;
      --partial: #fb923c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.4;
      min-height: 100vh;
    }

    #app { max-width: 480px; margin: 0 auto; padding: 0 0 80px; }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title { font-size: 13px; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; }
    .header-name { font-size: 19px; font-weight: 700; margin-top: 2px; }

    /* Session tabs */
    .session-tabs {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .session-tabs::-webkit-scrollbar { display: none; }

    .session-tab {
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      text-align: left;
      color: var(--text);
      transition: border-color 0.15s;
    }
    .session-tab.active {
      border-color: var(--accent);
      background: var(--surface);
    }
    .session-tab-name { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .session-tab-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .next-badge {
      display: inline-block;
      background: var(--next-badge);
      color: #000;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 5px;
      vertical-align: middle;
    }

    /* Breadcrumb */
    .breadcrumb {
      padding: 10px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      border-bottom: 1px solid var(--border);
    }
    .crumb {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 7px;
    }
    .crumb.partial { color: var(--partial); border-color: var(--partial); }
    .crumb.complete { color: var(--accent); border-color: var(--accent-dim); }
    .crumb-icon { font-size: 12px; }
    .crumb-label { max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Exercise cards */
    .exercises { padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }

    .exercise-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .exercise-header {
      padding: 12px 14px 8px;
      border-bottom: 1px solid var(--border);
    }
    .exercise-name { font-size: 14px; font-weight: 600; }
    .exercise-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .sets-grid {
      display: grid;
      padding: 10px 14px;
      gap: 8px;
    }

    .set-row {
      display: grid;
      grid-template-columns: 28px 1fr 1fr;
      align-items: center;
      gap: 8px;
    }
    .set-num {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      text-align: center;
    }
    .last-info {
      font-size: 12px;
      color: var(--text-muted);
    }
    .last-info span { color: var(--text); font-weight: 500; }

    .rep-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      padding: 7px 10px;
      width: 100%;
      text-align: center;
      -moz-appearance: textfield;
    }
    .rep-input::-webkit-outer-spin-button,
    .rep-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .rep-input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .rep-input.filled { border-color: var(--accent-dim); color: var(--accent); }

    /* Loading/error */
    .loading { padding: 40px 16px; text-align: center; color: var(--text-muted); }
    .error { padding: 40px 16px; text-align: center; color: #f87171; }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">Loading…</div>
  </div>
  <script src="app.js"></script>
</body>
</html>
