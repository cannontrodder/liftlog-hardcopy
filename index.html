<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LiftLog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #4ade80;
      --accent-dim: #166534;
      --next-badge: #facc15;
      --partial: #fb923c;
      --danger: #f87171;
      --timer-idle: #3a3a3a;
      --timer-active: #4ade80;
      --timer-warning: #fb923c;
      --timer-done: #facc15;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.4;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #app { max-width: 480px; margin: 0 auto; padding: 0 0 100px; }

    /* ── Header ─────────────────────────────────────────────────── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .header-title { font-size: 12px; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; }
    .header-row { display: flex; align-items: baseline; gap: 8px; margin-top: 2px; }
    .header-name { font-size: 19px; font-weight: 700; }
    .header-date { font-size: 13px; color: var(--text-muted); font-weight: 400; }
    .phase-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 6px;
      cursor: pointer;
      max-width: 160px;
    }
    .phase-select:focus { outline: none; border-color: var(--accent); }

    /* ── Session tabs ────────────────────────────────────────────── */
    .session-tabs {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .session-tabs::-webkit-scrollbar { display: none; }

    .session-tab {
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 11px;
      cursor: pointer;
      text-align: left;
      color: var(--text);
      transition: border-color 0.15s;
    }
    .session-tab.active {
      border-color: var(--accent);
      background: var(--surface);
    }
    .session-tab-name { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .session-tab-date { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    .next-badge {
      display: inline-block;
      background: var(--next-badge);
      color: #000;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 1px 4px;
      border-radius: 3px;
      margin-left: 4px;
      vertical-align: middle;
    }

    /* ── Breadcrumb (exercise progress dots) ─────────────────────── */
    .breadcrumb {
      padding: 8px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      border-bottom: 1px solid var(--border);
    }
    .crumb {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 6px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .crumb:hover { border-color: var(--text-muted); }
    .crumb.active-crumb { border-color: var(--text-muted); color: var(--text); }
    .crumb.partial { color: var(--partial); border-color: var(--partial); }
    .crumb.complete { color: var(--accent); border-color: var(--accent-dim); }
    .crumb-icon { font-size: 11px; }
    .crumb-label { max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Exercise navigator ──────────────────────────────────────── */
    .exercise-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .nav-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 18px;
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s, border-color 0.1s;
    }
    .nav-btn:hover { background: var(--surface); border-color: var(--text-muted); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .nav-counter {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: 0.04em;
      flex: 1;
      text-align: center;
    }
    .nav-focus-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.03em;
      padding: 0 10px;
      height: 40px;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .nav-focus-btn:hover { color: var(--text); border-color: var(--text-muted); }
    .nav-focus-btn.active { color: var(--accent); border-color: var(--accent-dim); }

    /* ── Exercise card ───────────────────────────────────────────── */
    .exercise-area { padding: 12px 16px; }

    .exercise-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .exercise-header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .exercise-header-left { flex: 1; min-width: 0; }
    .exercise-name { font-size: 15px; font-weight: 700; line-height: 1.3; }
    .exercise-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .exercise-header-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .exercise-header-actions .icon-btn {
      width: auto;
      min-width: 32px;
      padding: 0 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .icon-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 14px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .icon-btn:hover { color: var(--text); border-color: var(--text-muted); }

    /* ── Sets grid ───────────────────────────────────────────────── */
    .sets-grid {
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .set-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .set-label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      flex-shrink: 0;
      min-width: 36px;
    }
    .set-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      padding: 8px 6px;
      flex: 1;
      min-width: 0;
      text-align: center;
      -moz-appearance: textfield;
    }
    .set-input::-webkit-outer-spin-button,
    .set-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .set-input:focus { outline: none; border-color: var(--accent); }
    .set-input.filled { border-color: var(--accent-dim); color: var(--accent); }
    .set-mid {
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
      white-space: nowrap;
    }
    .set-delta {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
      min-width: 84px;
      text-align: right;
    }
    .warmup-panel {
      margin: 0 14px 10px;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(74, 222, 128, 0.08), rgba(26, 26, 26, 0.96));
    }
    .warmup-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .warmup-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      color: var(--accent);
    }
    .warmup-hint {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .warmup-rows {
      display: grid;
      gap: 8px;
    }
    .warmup-step {
      display: grid;
      grid-template-columns: auto auto 1fr;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .warmup-step-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
    }
    .warmup-step-pct {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }
    .warmup-step-weight {
      font-size: 14px;
      font-weight: 800;
      text-align: right;
      color: var(--accent);
    }

    /* ── History overlay ─────────────────────────────────────────── */
    .overlay-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 50;
      display: flex;
      align-items: flex-end;
    }
    .history-sheet {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      max-height: 70vh;
      overflow-y: auto;
    }
    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .sheet-title { font-size: 15px; font-weight: 700; }
    .sheet-close {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 14px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .history-row {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .history-row:last-child { border-bottom: none; }
    .history-date { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .history-sets { color: var(--text); }
    .history-sets span { color: var(--accent); font-weight: 600; }
    .history-empty { color: var(--text-muted); font-size: 13px; padding: 8px 0; }

    /* ── Session summary overlay ─────────────────────────────────── */
    .summary-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.68);
      z-index: 70;
      display: flex;
      align-items: flex-end;
    }
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px 18px 0 0;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      max-height: 72vh;
      overflow-y: auto;
    }
    .summary-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }
    .summary-eyebrow {
      font-size: 10px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .summary-title { font-size: 19px; font-weight: 800; line-height: 1.2; }
    .summary-close {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .summary-stats {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }
    .summary-stat {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 12px;
    }
    .summary-stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }
    .summary-stat-value {
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
      text-align: right;
    }
    .summary-note {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.45;
      margin-bottom: 14px;
    }
    .summary-actions {
      display: flex;
      gap: 10px;
    }
    .summary-action {
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }
    .summary-action-primary {
      background: var(--accent);
      color: #000;
      border-color: transparent;
    }

    /* ── Focus mode overlay ──────────────────────────────────────── */
    .focus-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 60;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
    }
    .focus-top-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 14px;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 10px;
    }
    .focus-back {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      padding: 8px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      justify-self: start;
    }
    .focus-timer-inline {
      background: var(--accent);
      color: #000;
      display: grid;
      grid-template-columns: 1fr;
      align-items: center;
      flex-shrink: 0;
      min-height: 58px;
      position: relative;
      width: 100%;
      z-index: 2;
    }
    .focus-timer-text {
      appearance: none;
      background: transparent;
      border: 0;
      color: #000;
      cursor: pointer;
      font-size: 20px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      height: 100%;
      letter-spacing: 0.02em;
      min-height: 58px;
      padding: 14px 60px;
      text-align: center;
      width: 100%;
    }
    .focus-timer-inline.warning { background: var(--timer-warning); }
    .focus-timer-inline.done { background: var(--timer-done); }
    .focus-timer-inline .timer-edit-btn {
      background: rgba(0, 0, 0, 0.16);
      border: 1px solid rgba(0, 0, 0, 0.25);
      color: #000;
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
    }
    .focus-timer-inline .timer-edit-btn:hover {
      border-color: #000;
      color: #000;
    }
    .timer-edit-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 15px;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    .timer-edit-btn:hover { color: var(--text); border-color: var(--text-muted); }
    .focus-body {
      flex: 1;
      overflow-y: auto;
      padding: 18px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .focus-name {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.2;
    }
    .focus-target {
      font-size: 15px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .focus-last {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 13px;
    }
    .focus-last-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .focus-last-list { display: flex; flex-direction: column; gap: 10px; }
    .focus-last-session {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .focus-last-session-meta {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
    }
    .focus-last-session-sets {
      display: grid;
      gap: 8px;
    }
    .focus-last-set {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .focus-last-set-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
    }
    .focus-last-set-line {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }
    .focus-last-metric-label {
      font-size: 12px;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .focus-last-metric-value {
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      text-align: right;
    }
    .focus-sets { display: flex; flex-direction: column; gap: 10px; }
    .focus-set-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 14px;
      display: grid;
      grid-template-columns: 22px 1fr 28px 1fr;
      align-items: center;
      gap: 10px;
    }
    .focus-set-row .set-input {
      font-size: 20px;
      padding: 12px 8px;
    }
    .focus-footer {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: grid;
      grid-template-columns: 1fr 3fr;
      gap: 10px;
    }
    .focus-nav-btn {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      padding: 14px 12px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .focus-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .focus-next-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      padding: 14px 16px;
      cursor: pointer;
      letter-spacing: 0.02em;
    }
    .focus-next-btn:disabled { background: var(--surface2); color: var(--text-muted); cursor: default; }

    /* ── Timer widget (shared — floating and focus inline) ──────────── */
    .timer-widget {
      display: flex;
      align-items: center;
      gap: 6px;
      position: relative;
    }
    .timer-pill {
      background: var(--timer-idle);
      border: 2px solid var(--border);
      border-radius: 999px;
      padding: 8px 14px;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      transition: background 0.2s, border-color 0.2s;
      min-width: 70px;
      justify-content: center;
    }
    .timer-pill.active { background: #0d2b1a; border-color: var(--accent); }
    .timer-pill.warning { background: #2b1500; border-color: var(--timer-warning); }
    .timer-pill.done { background: #2b2500; border-color: var(--timer-done); }
    .timer-text {
      font-size: 16px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text-muted);
    }
    .timer-pill.active .timer-text { color: var(--timer-active); }
    .timer-pill.warning .timer-text { color: var(--timer-warning); }
    .timer-pill.done .timer-text { color: var(--timer-done); }

    /* ── Floating timer container ─────────────────────────────────── */
    .rest-timer {
      position: fixed;
      bottom: 20px;
      right: 16px;
      z-index: 40;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    /* ── Timer presets popover ────────────────────────────────────── */
    .timer-popover {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 150px;
      position: absolute;
      bottom: calc(100% + 8px);
      right: 0;
      z-index: 10;
    }
    .focus-timer-inline .timer-popover {
